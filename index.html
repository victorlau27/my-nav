<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Victor 雲端導航 | 基礎穩定版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #f4f7f9; 
            margin: 0; 
            padding: 15px;
            overflow-y: auto !important; /* 強制允許滾動 */
            -webkit-overflow-scrolling: touch;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .edit-toggle { padding: 8px 15px; border-radius: 20px; border: 2px solid #007bff; background: white; color: #007bff; font-weight: bold; }
        .edit-mode .edit-toggle { background: #007bff; color: white; }

        .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; }
        .tab { padding: 10px 20px; background: #ddd; border-radius: 10px; white-space: nowrap; cursor: pointer; position: relative; }
        .tab.active { background: #007bff; color: white; }
        .tab.drag-over { background: #28a745 !important; color: white; }

        .add-area { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .edit-mode .add-area { display: none; } /* 編輯模式時隱藏新增區，減少干擾 */
        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }

        .links-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); 
            gap: 12px; 
            padding-bottom: 150px; /* 墊高底部，防止最後一排被擋住 */
        }
        .link-wrapper { position: relative; }
        .nav-item { 
            background: white; padding: 15px 5px; border-radius: 12px; 
            text-decoration: none; color: #333; display: flex; 
            flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .nav-item img { width: 40px; height: 40px; margin-bottom: 5px; pointer-events: none; }
        .nav-item span { font-size: 12px; pointer-events: none; }

        /* 編輯小按鈕 */
        .del-link, .edit-name-btn { position: absolute; width: 24px; height: 24px; border-radius: 50%; color: white; display: none; align-items: center; justify-content: center; z-index: 10; top: -5px; border: 2px solid white; }
        .del-link { right: -5px; background: #ff3b30; }
        .edit-name-btn { left: -5px; background: #ff9500; font-size: 10px; }
        .edit-mode .del-link, .edit-mode .edit-name-btn { display: flex; }

        .sortable-ghost { opacity: 0.2; }
        .sortable-drag { background: white !important; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="main-content">
    <div class="header">
        <h2 id="mainTitle">Victor 雲端導航</h2>
        <button class="edit-toggle" onclick="toggleEdit()">編輯模式</button>
    </div>

    <div class="tabs-container" id="tabsBar"></div>

    <div class="add-area">
        <input type="text" id="linkName" placeholder="名稱">
        <input type="text" id="linkUrl" placeholder="網址 (https://...)">
        <select id="catSelect"></select>
        <button onclick="addLink()" style="width:100%; padding:10px; background:#007bff; color:white; border:none; border-radius:5px;">新增</button>
    </div>

    <div class="links-grid" id="linksGrid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://my-nav-10a8c-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('navData');

    let localData = { categories: ["AI網站"], currentTab: "AI網站", links: [] };
    let isEditMode = false;

    db.on('value', (s) => {
        const d = s.val();
        if (d) { 
            localData = d; 
            if (!localData.links) localData.links = [];
        }
        render();
    });

    function saveData() { db.set(localData); }

    function render() {
        document.body.className = isEditMode ? 'edit-mode' : '';
        
        const tabsBar = document.getElementById('tabsBar');
        tabsBar.innerHTML = localData.categories.map(cat => `
            <div class="tab ${localData.currentTab === cat ? 'active' : ''}" data-id="${cat}" onclick="if(!isEditMode) switchTab('${cat}')">
                ${cat}
            </div>
        `).join('') + (isEditMode ? `<div class="tab" onclick="addCat()">＋</div>` : '');

        document.getElementById('catSelect').innerHTML = localData.categories.map(c => `<option value="${c}" ${localData.currentTab === c ? 'selected' : ''}>${c}</option>`).join('');

        const grid = document.getElementById('linksGrid');
        const currentLinks = localData.links.filter(l => l.category === localData.currentTab);
        
        grid.innerHTML = currentLinks.map(l => {
            const idx = localData.links.indexOf(l);
            return `
                <div class="link-wrapper" data-idx="${idx}">
                    <div class="del-link" onclick="removeLink(${idx})">✕</div>
                    <div class="edit-name-btn" onclick="renameLink(${idx})">✎</div>
                    <a href="${l.url}" target="_blank" class="nav-item">
                        <img src="https://www.google.com/s2/favicons?domain=${l.url}&sz=64">
                        <span>${l.name}</span>
                    </a>
                </div>`;
        }).join('');
        initSortable();
    }

    function initSortable() {
        if (!isEditMode) return;
        new Sortable(document.getElementById('linksGrid'), {
            animation: 150,
            delay: 100,
            delayOnTouchOnly: true,
            onEnd: (evt) => {
                const sorted = [];
                const others = localData.links.filter(l => l.category !== localData.currentTab);
                document.querySelectorAll('.link-wrapper').forEach(el => sorted.push(localData.links[el.dataset.idx]));
                localData.links = [...others, ...sorted];
                saveData();
            }
        });
    }

    window.toggleEdit = () => { isEditMode = !isEditMode; render(); };
    window.switchTab = (cat) => { localData.currentTab = cat; render(); };
    window.addLink = () => {
        const name = document.getElementById('linkName').value;
        const url = document.getElementById('linkUrl').value;
        if (!name || !url) return alert("請填寫");
        localData.links.push({ name, url, category: document.getElementById('catSelect').value });
        saveData();
        document.getElementById('linkName').value = ''; document.getElementById('linkUrl').value = '';
    };
    window.removeLink = (idx) => { if(confirm("刪除？")) { localData.links.splice(idx, 1); saveData(); } };
    window.renameLink = (idx) => {
        const n = prompt("新名稱：", localData.links[idx].name);
        if(n) { localData.links[idx].name = n; saveData(); }
    };
    window.addCat = () => { const n = prompt("新分類："); if(n) { localData.categories.push(n); saveData(); } };
</script>
</body>
</html>
