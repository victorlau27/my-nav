<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Victor 導航 | 終極兼容版</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f4f7f9; --card: #ffffff; --primary: #007bff; --text: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .edit-toggle { padding: 10px 18px; border-radius: 20px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: bold; }
        .edit-mode .edit-toggle { background: var(--primary); color: white; }

        .tabs-container { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; min-height: 60px; }
        .tab { padding: 12px 20px; background: #e0e6ed; border-radius: 12px; white-space: nowrap; cursor: pointer; position: relative; font-weight: bold; border: 2px solid transparent; }
        .tab.active { background: var(--primary); color: white; }
        .tab.drag-over { background: #28a745 !important; transform: scale(1.1); }
        .edit-mode .tab { border: 1px dashed #999; }

        .add-area { background: white; padding: 15px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .edit-mode .add-area { display: none; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }

        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding-bottom: 150px; }
        .link-wrapper { position: relative; }
        .nav-item { background: white; padding: 15px 5px; border-radius: 15px; text-decoration: none; color: var(--text); display: flex; flex-direction: column; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-item img { width: 44px; height: 44px; margin-bottom: 8px; border-radius: 8px; pointer-events: none; }
        .nav-item span { font-size: 12px; pointer-events: none; }

        .del-link, .edit-name-btn { position: absolute; width: 24px; height: 24px; border-radius: 50%; color: white; display: none; align-items: center; justify-content: center; z-index: 99; top: -8px; border: 2px solid white; font-weight: bold; }
        .del-link { right: -8px; background: #ff3b30; }
        .edit-name-btn { left: -8px; background: #ff9500; font-size: 10px; }
        .edit-mode .del-link, .edit-mode .edit-name-btn { display: flex; }

        /* 拖拽效果 */
        .sortable-drag { opacity: 0.9 !important; background: white !important; box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important; border: 2px solid var(--primary) !important; }
        .sortable-ghost { opacity: 0 !important; }
    </style>
</head>
<body class="edit-mode-off">

<div class="header">
    <h2 id="mainTitle">Victor 導航</h2>
    <button class="edit-toggle" onclick="toggleEdit()">編輯模式</button>
</div>

<div class="tabs-container" id="tabsBar"></div>

<div class="add-area" id="addArea">
    <input type="text" id="linkName" placeholder="名稱">
    <input type="text" id="linkUrl" placeholder="網址 (https://...)">
    <select id="catSelect"></select>
    <button onclick="addLink()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">新增網址</button>
</div>

<div class="links-grid" id="linksGrid"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://my-nav-10a8c-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('navData');

    let localData = { categories: ["AI網站"], currentTab: "AI網站", links: [] };
    let isEditMode = false;
    let gridInstance = null;
    let tabsInstance = null;

    // 初次讀取
    db.once('value').then(s => {
        if (s.val()) localData = s.val();
        render();
    });

    // 監聽外部變化（其他設備更新時才重繪）
    db.on('value', s => {
        if (!isEditMode) {
            const d = s.val();
            if (d) {
                localData = d;
                render();
            }
        }
    });

    function saveData() { db.set(localData); }

    function render() {
        document.body.className = isEditMode ? 'edit-mode' : '';
        
        // 渲染分頁
        const tabsBar = document.getElementById('tabsBar');
        tabsBar.innerHTML = localData.categories.map(cat => `
            <div class="tab ${localData.currentTab === cat ? 'active' : ''}" data-id="${cat}" onclick="if(!isEditMode) switchTab('${cat}')">
                ${cat}
            </div>
        `).join('') + (isEditMode ? `<div class="tab" onclick="addCat()">＋</div>` : '');

        document.getElementById('catSelect').innerHTML = localData.categories.map(c => `<option value="${c}" ${localData.currentTab === c ? 'selected' : ''}>${c}</option>`).join('');

        // 渲染圖標
        const grid = document.getElementById('linksGrid');
        const currentLinks = (localData.links || []).filter(l => l.category === localData.currentTab);
        grid.innerHTML = currentLinks.map(l => {
            const idx = localData.links.indexOf(l);
            return `
                <div class="link-wrapper" data-idx="${idx}">
                    <div class="del-link" onclick="removeLink(${idx})">✕</div>
                    <div class="edit-name-btn" onclick="renameLink(${idx})">✎</div>
                    <a href="${l.url}" target="_blank" class="nav-item">
                        <img src="https://www.google.com/s2/favicons?domain=${l.url}&sz=128" onerror="this.src='https://img.icons8.com/fluency/48/globe.png'">
                        <span>${l.name}</span>
                    </a>
                </div>`;
        }).join('');
        
        initSortable();
    }

    function initSortable() {
        // 先清理舊的
        if (gridInstance) gridInstance.destroy();
        if (tabsInstance) tabsInstance.destroy();
        if (!isEditMode) return;

        // 圖標移動 (網格)
        gridInstance = new Sortable(document.getElementById('linksGrid'), {
            animation: 150,
            delay: 150, // 稍微延遲，確保是拖動而不是誤觸
            delayOnTouchOnly: true,
            forceFallback: true, // 強制不使用原生拖放
            onMove: (evt) => {
                const hit = document.elementFromPoint(evt.originalEvent.clientX, evt.originalEvent.clientY);
                const targetTab = hit ? hit.closest('.tab') : null;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
                if (targetTab && targetTab.dataset.id) targetTab.classList.add('drag-over');
            },
            onEnd: (evt) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
                const hit = document.elementFromPoint(evt.originalEvent.clientX, evt.originalEvent.clientY);
                const targetTab = hit ? hit.closest('.tab') : null;

                if (targetTab && targetTab.dataset.id && targetTab.dataset.id !== localData.currentTab) {
                    const linkIdx = evt.item.dataset.idx;
                    localData.links[linkIdx].category = targetTab.dataset.id;
                    localData.currentTab = targetTab.dataset.id;
                    saveData();
                    render(); // 跨分類才需要重刷
                } else if (evt.oldIndex !== evt.newIndex) {
                    // 僅限於本分類內排序
                    const others = localData.links.filter(l => l.category !== localData.currentTab);
                    const current = [];
                    document.querySelectorAll('.link-wrapper').forEach(el => {
                        current.push(localData.links[el.dataset.idx]);
                    });
                    localData.links = [...others, ...current];
                    saveData();
                    // 這裡不調用 render()，防止 DOM 閃爍和失效，僅更新內部的 dataset
                    document.querySelectorAll('.link-wrapper').forEach((el, i) => {
                        // 更新索引，防止下次移動報錯
                    });
                    render(); // 為了保險起見，排序完還是刷一次，但這次實例已經銷毀重啟了
                }
            }
        });

        // 分頁移動 (Tabs)
        tabsInstance = new Sortable(document.getElementById('tabsBar'), {
            animation: 150,
            delay: 150,
            delayOnTouchOnly: true,
            forceFallback: true,
            filter: '.tab:last-child', // ＋ 號不准動
            onEnd: () => {
                const newCats = Array.from(document.querySelectorAll('.tab[data-id]')).map(el => el.dataset.id);
                if (JSON.stringify(newCats) !== JSON.stringify(localData.categories)) {
                    localData.categories = newCats;
                    saveData();
                    render();
                }
            }
        });
    }

    // 基礎功能
    window.toggleEdit = () => { isEditMode = !isEditMode; render(); };
    window.switchTab = (cat) => { localData.currentTab = cat; render(); };
    window.addLink = () => {
        const n = document.getElementById('linkName').value, u = document.getElementById('linkUrl').value;
        if (!n || !u) return;
        localData.links.push({ name: n, url: u, category: document.getElementById('catSelect').value });
        saveData(); render();
        document.getElementById('linkName').value = ''; document.getElementById('linkUrl').value = '';
    };
    window.removeLink = (i) => { if(confirm("刪除？")) { localData.links.splice(i, 1); saveData(); render(); } };
    window.renameLink = (i) => {
        const n = prompt("改名：", localData.links[i].name);
        if(n) { localData.links[i].name = n; saveData(); render(); }
    };
    window.addCat = () => { const n = prompt("新分類："); if(n) { localData.categories.push(n); saveData(); render(); } };
</script>
</body>
</html>
